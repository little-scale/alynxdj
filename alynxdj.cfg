# ALYNXDJ linker config — cc65 lynx.cfg with the RAM map made ours.
#
# Memory map (64 KB unified RAM):
#   $0000-$00FF  zero page
#   $0100-$01FF  6502 hardware stack
#   $0200-$9DFF  code + data (MAIN; 512-byte C stack grows down from $A000)
#   $A000-$BFDF  framebuffer, 160x102 @ 4bpp = 8160 bytes (SCRBASE -> $A000)
#   $C000-$C047  fixed live state + editor/harness mirrors ($C016 WAIT;
#                 $C027/$C028 PCM underruns; $C029 physical cart owner)
#   $C048-$C087  phrase pass counters; $C088-$C0C7 phrase clipboard / IN24 RX
#   $C0C8-$C0E7  chain clipboard; $C0E8-$C0F8 sample stream state
#   $C0F9-$C0FB  IN24 RX ring state; $C0FC-$C0FF per-track G countdowns
#   $C100-$C8EF  EEPROM pack buffer; $C100-$C6FF holds the live helper overlay
#                 between save/pack operations (reloaded afterward)
#   $C8F0-$C8F7  DAC arbitration state; $C8F8 last PHRASE instrument latch
#   $C8F9-$C8FF  spare
#   $C900-$CFFF  cold-loaded pool code (HICODE1)
#   $D000-$D3FF  PCM sample ring (cart streaming, irq.s/pool.c)
#   $D400-$F31F  HIRAM: song block + engine/editor state (SONG segment)
#   $F320-$F5FF  cold-loaded modulation/editor/save helpers (HICODE3)
#   $F600-$FBFF  cold-loaded engine/support code (HICODE2)
#   $FC00-$FFFF  Suzy/Mikey registers (RAM behind them unused; vectors $FFFA+ RAM)
#
# LOWCODE is non-optional here; src/lowcode.s instantiates it (cc65 2.18 bug,
# see Makefile).
SYMBOLS {
    __STACKSIZE__:        type = weak, value = $0200; # 512-byte C stack
    __STARTOFDIRECTORY__: type = weak, value = $00CB;
    __BANK0BLOCKSIZE__:   type = weak, value = $0400;
    __BANK1BLOCKSIZE__:   type = weak, value = $0000;
    __EXEHDR__:           type = import;
    __BOOTLDR__:          type = import;
    __DEFDIR__:           type = import;
}
MEMORY {
    ZP:     file = "", define = yes, start = $0000, size = $0100;
    HEADER: file = %O,               start = $0000, size = $0040;
    BOOT:   file = %O,               start = $0200, size = __STARTOFDIRECTORY__;
    DIR:    file = %O,               start = $0000, size = 8;
    MAIN:   file = %O, define = yes, start = $0200, size = $9E00 - __STACKSIZE__;
    MIRROR: file = "", define = yes, start = $C048, size = $00B1;
    TAPWAIT:file = "", define = yes, start = $C0FC, size = $0004;
    TAIL:   file = "", define = yes, start = $C8F0, size = $0010;
    MIDIAUX:file = "build/auxmidi.bin", start = $C100, size = $0600;
    AUX1:   file = "build/aux1.bin", start = $C900, size = $0700;
    HIRAM:  file = "", define = yes, start = $D400, size = $1F20;
    AUX3:   file = "build/aux3.bin", start = $F320, size = $02E0;
    AUX2:   file = "build/aux2.bin", start = $F600, size = $0600;
}
SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    EXTZP:     load = ZP,     type = zp,                optional = yes;
    APPZP:     load = ZP,     type = zp,                optional = yes;
    EXEHDR:    load = HEADER, type = ro;
    BOOTLDR:   load = BOOT,   type = ro;
    DIRECTORY: load = DIR,    type = ro;
    STARTUP:   load = MAIN,   type = ro,  define = yes;
    LOWCODE:   load = MAIN,   type = ro,  define = yes;
    ONCE:      load = MAIN,   type = ro,  define = yes, optional = yes;
    CODE:      load = MAIN,   type = ro,  define = yes;
    RODATA:    load = MAIN,   type = ro,  define = yes;
    DATA:      load = MAIN,   type = rw,  define = yes;
    BSS:       load = MAIN,   type = bss, define = yes;
    MIRRORRAM: load = MIRROR, type = bss, define = yes;
    TAPRAM:   load = TAPWAIT,type = bss, define = yes;
    TAILRAM:   load = TAIL,   type = bss, define = yes;
    MIDICODE:  load = MIDIAUX,type = ro,  define = yes;
    HICODE1:   load = AUX1,   type = ro,  define = yes;
    SONG:      load = HIRAM,  type = bss, define = yes;
    HICODE3:   load = AUX3,   type = ro,  define = yes;
    HICODE2:   load = AUX2,   type = ro,  define = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
