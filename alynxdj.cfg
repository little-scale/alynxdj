# ALYNXDJ linker config — cc65 lynx.cfg with the RAM map made ours.
#
# Memory map (64 KB unified RAM):
#   $0000-$00FF  zero page
#   $0100-$01FF  6502 hardware stack
#   $0200-$97FF  code + data (MAIN; cc65 C-stack $9800-$9FFF grows down from $A000)
#   $A000-$BFDF  framebuffer, 160x102 @ 4bpp = 8160 bytes (SCRBASE -> $A000)
#   $C000-$C0FF  harness debug mirrors
#   $C100-$C8FF  EEPROM pack buffer (save.c, 2040 bytes max)
#   $C900-$CFFF  spare
#   $D000-$D3FF  PCM sample ring (cart streaming, irq.s/pool.c)
#   $D400-$FBFF  HIRAM: the song block + engine/editor state (SONG segment)
#   $FC00-$FFFF  Suzy/Mikey registers (RAM behind them unused; vectors $FFFA+ RAM)
#
# LOWCODE is non-optional here; src/lowcode.s instantiates it (cc65 2.18 bug,
# see Makefile).
SYMBOLS {
    __STACKSIZE__:        type = weak, value = $0400; # 1k C stack
    __STARTOFDIRECTORY__: type = weak, value = $00CB;
    __BANK0BLOCKSIZE__:   type = weak, value = $0400;
    __BANK1BLOCKSIZE__:   type = weak, value = $0000;
    __EXEHDR__:           type = import;
    __BOOTLDR__:          type = import;
    __DEFDIR__:           type = import;
}
MEMORY {
    ZP:     file = "", define = yes, start = $0000, size = $0100;
    HEADER: file = %O,               start = $0000, size = $0040;
    BOOT:   file = %O,               start = $0200, size = __STARTOFDIRECTORY__;
    DIR:    file = %O,               start = $0000, size = 8;
    MAIN:   file = %O, define = yes, start = $0200, size = $9E00 - __STACKSIZE__;
    HIRAM:  file = "", define = yes, start = $D400, size = $2800;
}
SEGMENTS {
    ZEROPAGE:  load = ZP,     type = zp;
    EXTZP:     load = ZP,     type = zp,                optional = yes;
    APPZP:     load = ZP,     type = zp,                optional = yes;
    EXEHDR:    load = HEADER, type = ro;
    BOOTLDR:   load = BOOT,   type = ro;
    DIRECTORY: load = DIR,    type = ro;
    STARTUP:   load = MAIN,   type = ro,  define = yes;
    LOWCODE:   load = MAIN,   type = ro,  define = yes;
    ONCE:      load = MAIN,   type = ro,  define = yes, optional = yes;
    CODE:      load = MAIN,   type = ro,  define = yes;
    RODATA:    load = MAIN,   type = ro,  define = yes;
    DATA:      load = MAIN,   type = rw,  define = yes;
    BSS:       load = MAIN,   type = bss, define = yes;
    SONG:      load = HIRAM,  type = bss, define = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
