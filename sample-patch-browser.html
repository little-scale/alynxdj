<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Replace, audition, and patch the sample kits inside a built ALYNXDJ ROM—all locally in one HTML file.">
  <title>ALYNXDJ Sample Patch Browser</title>
  <style>
    :root {
      --ink:#110f1b; --ink2:#1a1628; --panel:#1d192beb; --panel2:#252038;
      --line:#d9d6e829; --muted:#aaa5bd; --paper:#f6f3ff; --acid:#d9ff4f;
      --aqua:#58f3d2; --violet:#a581ff; --red:#ff6f7f;
    }
    * { box-sizing:border-box }
    html { min-width:320px; background:var(--ink) }
    body {
      min-height:100vh; margin:0; color:var(--paper);
      background:
        linear-gradient(#58f3d206 1px,transparent 1px),
        linear-gradient(90deg,#58f3d206 1px,transparent 1px),
        radial-gradient(circle at 12% -8%,#a581ff40,transparent 31rem),var(--ink);
      background-size:32px 32px,32px 32px,auto,auto;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    button,input,output { font:inherit }
    button,label { -webkit-tap-highlight-color:transparent }
    button:focus-visible,label:focus-within,[role=tab]:focus-visible {
      outline:2px solid var(--acid); outline-offset:3px;
    }
    .shell { width:min(1180px,calc(100% - 40px)); margin:auto; padding:52px 0 28px }
    .hero { display:flex; justify-content:space-between; align-items:flex-end; gap:32px; margin-bottom:36px }
    .eyebrow { margin:0 0 10px; color:var(--aqua); letter-spacing:.18em; font:700 12px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace }
    .hero h1 { margin:0; letter-spacing:-.055em; font:800 clamp(40px,7vw,76px)/.92 ui-sans-serif,system-ui,sans-serif }
    .lede { max-width:710px; margin:19px 0 0; color:#c7c2d5; font-size:18px; line-height:1.55 }
    .local-badge { display:flex; flex:none; align-items:center; gap:9px; padding:10px 13px; color:#d6fff7; background:#58f3d212; border:1px solid #58f3d259; text-transform:uppercase; letter-spacing:.06em; font:650 12px/1 ui-monospace,SFMono-Regular,monospace }
    .local-badge span,.status-dot { width:8px; height:8px; border-radius:50%; background:var(--aqua); box-shadow:0 0 14px var(--aqua) }
    .step-strip { display:grid; grid-template-columns:repeat(3,1fr); margin-bottom:18px; background:#110f1ba6; border:1px solid var(--line) }
    .step-strip div { position:relative; display:flex; align-items:center; gap:13px; padding:16px 18px; color:#777187; border-right:1px solid var(--line); text-transform:uppercase; letter-spacing:.08em; font-size:13px }
    .step-strip div:last-child { border:0 }
    .step-strip b { font:700 11px/1 ui-monospace,SFMono-Regular,monospace }
    .step-strip .active { color:var(--paper) }
    .step-strip .active b { color:var(--acid) }
    .step-strip .done { color:#a9dfd4 }
    .step-strip .done:after { content:""; position:absolute; right:0; bottom:-1px; left:0; height:2px; background:var(--aqua) }
    .panel { background:var(--panel); border:1px solid var(--line); box-shadow:0 24px 80px #00000038 }
    .load-panel { padding:18px }
    .dropzone { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:430px; padding:48px 24px; text-align:center; background:radial-gradient(circle,#a581ff1f,transparent 48%); border:1px dashed #a581ff8f; transition:.2s }
    .dropzone:hover,.dropzone.dragging { border-color:var(--acid); background:radial-gradient(circle,#d9ff4f14,transparent 48%) }
    .cart-mark { position:relative; width:72px; height:88px; margin-bottom:26px; border:2px solid var(--aqua); border-radius:8px 8px 3px 3px; box-shadow:inset 0 0 0 8px #58f3d20d,0 0 26px #58f3d21f }
    .cart-mark:before { content:""; position:absolute; top:-8px; left:17px; width:34px; height:8px; background:var(--ink2); border:2px solid var(--aqua) }
    .cart-mark:after { content:""; position:absolute; right:14px; bottom:14px; left:14px; height:12px; background:repeating-linear-gradient(90deg,var(--acid) 0 3px,transparent 3px 7px) }
    .cart-mark span { display:grid; height:56px; place-items:center; color:var(--aqua); font:800 20px/1 ui-monospace,monospace }
    .drop-kicker { color:var(--violet); text-transform:uppercase; letter-spacing:.16em; font:700 11px/1 ui-monospace,monospace }
    .dropzone h2 { margin:3px 0 10px; letter-spacing:-.03em; font-size:clamp(25px,4vw,38px) }
    .dropzone>p:not(.drop-kicker) { max-width:620px; color:var(--muted); line-height:1.55 }
    .primary,.download { padding:14px 22px; color:#171520; background:var(--acid); border:0; cursor:pointer; font-weight:800; box-shadow:4px 4px #d9ff4f38 }
    .primary { min-width:160px; margin-top:17px }
    .primary:hover,.download:hover { background:#e7ff89; transform:translateY(-1px) }
    .primary:disabled,.download:disabled { opacity:.36; cursor:not-allowed; transform:none }
    .spec-row { display:grid; grid-template-columns:repeat(3,1fr); margin-top:18px; border-top:1px solid var(--line) }
    .spec-row span { padding:18px; color:var(--muted); text-align:center; text-transform:uppercase; letter-spacing:.06em; font:12px/1.4 ui-monospace,monospace }
    .spec-row b { color:var(--paper) }
    .rom-bar { display:grid; grid-template-columns:minmax(280px,1.8fr) 1fr 1fr auto; align-items:center; gap:20px; margin-bottom:18px; padding:17px 20px }
    .rom-identity { display:flex; align-items:center; gap:14px; min-width:0 }
    .rom-identity div,.rom-stat { display:grid; gap:5px; min-width:0 }
    .rom-bar small,.export-panel small { color:var(--muted); letter-spacing:.12em; font:700 10px/1 ui-monospace,monospace }
    .rom-identity strong { overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
    .rom-stat strong { font:650 13px/1.2 ui-monospace,monospace }
    .secondary,.text-button,.audition,.replace,.revert { color:var(--paper); background:#ffffff09; border:1px solid var(--line); cursor:pointer }
    .secondary { padding:10px 14px; font-size:13px }
    .secondary:hover,.audition:hover,.replace:hover { background:#58f3d212; border-color:var(--aqua) }
    .text-button { padding:10px 4px; color:var(--muted); border-color:transparent }
    .text-button:hover { color:var(--red) }
    .secondary:disabled,.text-button:disabled { opacity:.35; cursor:not-allowed }
    .workspace { padding:26px }
    .workspace-head { display:flex; justify-content:space-between; align-items:flex-end; gap:24px; margin-bottom:24px }
    .workspace-head h2 { margin:0; letter-spacing:-.025em; font-size:25px }
    .toolbar { display:flex; flex-wrap:wrap; align-items:center; justify-content:flex-end; gap:10px }
    .kit-tabs { display:grid; grid-template-columns:repeat(8,1fr); margin-bottom:22px; overflow-x:auto; border:1px solid var(--line) }
    .kit-tabs button { position:relative; display:grid; align-content:center; gap:5px; min-width:95px; min-height:70px; padding:11px 14px; color:var(--muted); background:#171422; border:0; border-right:1px solid var(--line); cursor:pointer; text-align:left }
    .kit-tabs button:last-child { border-right:0 }
    .kit-tabs b { color:#6d667e; font:700 10px/1 ui-monospace,monospace }
    .kit-tabs span { font-size:12px; font-weight:700; white-space:nowrap }
    .kit-tabs button.selected { color:var(--paper); background:var(--panel2); box-shadow:inset 0 -3px var(--acid) }
    .kit-tabs button.selected b { color:var(--acid) }
    .kit-tabs i { position:absolute; top:9px; right:9px; width:6px; height:6px; background:var(--violet); border-radius:50%; box-shadow:0 0 10px var(--violet) }
    .sample-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px }
    .sample-card { min-width:0; padding:16px; background:#181522; border:1px solid var(--line); transition:.18s }
    .sample-card:hover,.sample-card.dragging { border-color:#58f3d266; transform:translateY(-2px) }
    .sample-card.changed { background:linear-gradient(145deg,#a581ff1a,transparent 62%),#181522; border-color:#a581ff8c }
    .sample-title { display:flex; align-items:center; gap:10px; min-width:0 }
    .pad-number { display:grid; flex:0 0 33px; width:33px; height:33px; place-items:center; color:var(--acid); border:1px solid #d9ff4f40; font:700 11px/1 ui-monospace,monospace }
    .sample-title div { flex:1; min-width:0 }
    .sample-title h3 { margin:0 0 4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px }
    .sample-title p { margin:0; color:#756f85; text-transform:uppercase; font:10px/1 ui-monospace,monospace }
    .changed-tag,.warning-chip { padding:4px 6px; color:#171520; background:var(--violet); font:800 9px/1 ui-monospace,monospace }
    .warning-chip { color:#271c0f; background:#ffc85c }
    .waveform { position:relative; height:58px; margin:15px 0 8px; overflow:hidden; background:#100e18; border:1px solid #ffffff0b }
    .wave-bars { position:absolute; inset:8px 5px; display:flex; align-items:center; gap:2px; pointer-events:none }
    .wave-bar { flex:1 1 0; min-width:1px; background:var(--aqua); opacity:.68 }
    .changed .wave-bar { background:var(--violet); opacity:.86 }
    .trim-shade { position:absolute; z-index:2; top:0; bottom:0; background:#090711b8; pointer-events:none }
    .trim-shade.start { left:0 }
    .trim-shade.end { right:0 }
    .trim-line { position:absolute; z-index:3; top:0; bottom:0; width:2px; background:var(--acid); pointer-events:none; box-shadow:0 0 7px #d9ff4f9c }
    .trim-line.end { background:var(--violet); box-shadow:0 0 7px #a581ff9c }
    .trim-range { appearance:none; -webkit-appearance:none; position:absolute; z-index:4; inset:0; width:100%; height:100%; margin:0; background:transparent; pointer-events:none }
    .trim-range::-webkit-slider-runnable-track { height:100%; background:transparent }
    .trim-range::-webkit-slider-thumb { appearance:none; -webkit-appearance:none; width:14px; height:58px; margin:0; background:transparent; border:0; pointer-events:auto; cursor:ew-resize }
    .trim-range::-moz-range-track { height:100%; background:transparent; border:0 }
    .trim-range::-moz-range-thumb { width:14px; height:58px; background:transparent; border:0; pointer-events:auto; cursor:ew-resize }
    .trim-readout { display:flex; justify-content:space-between; gap:8px; margin:0 0 9px; color:#746d84; text-transform:uppercase; font:700 8px/1 ui-monospace,monospace }
    .trim-readout output { color:var(--muted); font-size:9px }
    .sample-meta { display:flex; align-items:center; gap:9px; min-height:18px; color:var(--muted); text-transform:uppercase; font:10px/1 ui-monospace,monospace }
    .processing { display:grid; gap:10px; margin-top:13px; padding-top:12px; border-top:1px solid var(--line) }
    .gain-control { display:grid; gap:7px }
    .gain-head { display:flex; justify-content:space-between; align-items:center; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font:700 9px/1 ui-monospace,monospace }
    .gain-head output { color:var(--acid); letter-spacing:0; font-size:10px }
    .gain-control input { width:100%; margin:0; accent-color:var(--acid); cursor:pointer }
    .drive-control { display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:31px; padding:7px 9px; color:var(--muted); background:#ffffff07; border:1px solid var(--line); cursor:pointer; text-transform:uppercase; letter-spacing:.07em; font:700 9px/1 ui-monospace,monospace }
    .drive-control span:last-child { color:#756f85; letter-spacing:0; font-weight:500; text-transform:none }
    .drive-control.active { color:var(--paper); background:#a581ff17; border-color:#a581ff72 }
    .drive-control input { width:15px; height:15px; margin:0; accent-color:var(--violet); cursor:pointer }
    .sample-actions { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:14px }
    .audition,.replace,.revert { display:flex; align-items:center; justify-content:center; gap:7px; min-height:34px; padding:8px; font-size:11px; font-weight:700 }
    .replace { cursor:pointer }
    .revert { grid-column:1/-1; color:#d3c5ff; border-color:#a581ff47 }
    .revert:hover { color:#ffd9de; border-color:var(--red) }
    .drop-hint { display:none; position:absolute; inset:8px; place-items:center; color:var(--acid); background:#110f1be8; border:1px dashed var(--acid); font:700 11px/1 ui-monospace,monospace }
    .sample-card { position:relative }
    .sample-card.dragging .drop-hint { display:grid }
    .export-panel { display:grid; grid-template-columns:1.6fr 1fr; align-items:center; gap:40px; margin-top:18px; padding:23px 26px }
    .capacity-label { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px }
    .capacity-label>div { display:grid; gap:6px }
    .capacity-label>span { color:var(--acid); font:700 13px/1 ui-monospace,monospace }
    .meter { height:8px; overflow:hidden; background:#0f0d17 }
    .meter span { display:block; height:100%; background:linear-gradient(90deg,var(--aqua),var(--acid)); transition:width .25s }
    .capacity p { margin:9px 0 0; color:var(--muted); font-size:12px }
    .invalid .meter span { background:var(--red) }
    .invalid .capacity p { color:#ffb5bd }
    .export-action { display:flex; justify-content:flex-end; align-items:center; gap:20px }
    .export-action>div { display:grid; justify-items:end }
    .export-action strong { color:var(--violet); font:800 24px/1 ui-monospace,monospace }
    .export-action span { color:var(--muted); font-size:11px }
    .download { min-height:48px }
    .download span { margin-left:6px; color:#171520; font-size:18px }
    .notice { display:flex; align-items:center; gap:10px; min-height:43px; margin-top:12px; padding:10px 13px; color:#b9b4c8; background:#58f3d20b; border-left:2px solid var(--aqua); font:12px/1.45 ui-monospace,monospace }
    .notice>span { color:var(--aqua); font-size:22px }
    .notice.error { color:#ffd7dc; background:#ff6f7f12; border-color:var(--red) }
    .notice.error>span { color:var(--red) }
    footer { display:flex; justify-content:space-between; gap:20px; padding:24px 2px 0; color:#5e586d; text-transform:uppercase; letter-spacing:.1em; font:9px/1.4 ui-monospace,monospace }
    [hidden] { display:none!important }
    @media (max-width:960px) {
      .sample-grid { grid-template-columns:repeat(2,1fr) }
      .rom-bar { grid-template-columns:1.5fr 1fr auto }
      .rom-stat:first-of-type { display:none }
      .export-panel { grid-template-columns:1fr; gap:24px }
      .export-action { justify-content:space-between }
    }
    @media (max-width:680px) {
      .shell { width:min(calc(100% - 22px),1180px); padding-top:28px }
      .hero { flex-direction:column; align-items:flex-start }
      .hero h1 { font-size:46px }
      .lede { font-size:16px }
      .step-strip div { gap:7px; padding:13px 9px; font-size:10px }
      .load-panel { padding:9px }
      .dropzone { min-height:370px; padding:36px 18px }
      .spec-row { grid-template-columns:1fr }
      .spec-row span { padding:11px; border-bottom:1px solid var(--line) }
      .rom-bar { grid-template-columns:1fr auto; gap:12px }
      .rom-stat { display:none }
      .workspace { padding:17px 12px }
      .workspace-head { flex-direction:column; align-items:flex-start }
      .toolbar { justify-content:space-between; width:100% }
      .sample-grid { grid-template-columns:1fr }
      .sample-card:hover { transform:none }
      .export-panel { padding:18px }
      .export-action { flex-direction:column; align-items:stretch }
      .export-action>div { grid-template-columns:auto 1fr; justify-content:start; place-items:baseline start; gap:8px }
      footer { flex-direction:column }
    }
    @media (prefers-reduced-motion:reduce) { *,:before,:after { transition:none!important } }
  </style>
</head>
<body>
  <main id="app" class="shell"></main>
  <noscript>This tool needs JavaScript enabled to read and patch ROM files locally.</noscript>
  <script id="patcher-script">
  (() => {
    "use strict";

    const ROM_BYTES = 262208;                 // 64-byte .lnx header + 256 KB cart
    const POOL_OFFSET = 64 + 45 * 1024;       // cart block 45
    const LEGACY_POOL_END = 64 + 200 * 1024;   // earlier MIDI-helper location
    const POOL_END = 64 + 250 * 1024;          // HELP runtime starts at block 250
    const PRE_HELP_POOL_END = 64 + 254 * 1024; // v0.51 layout, before HELP
    const HELP_DATA_OFFSET = 64 + 251 * 1024;
    const POOL_CAPACITY = POOL_END - POOL_OFFSET;
    const PCM_RATE = 7812.5;
    const SLOT_CAP = 65535;                    // u16 sample length, about 8.39 s
    const GAIN_MIN = -24;
    const GAIN_MAX = 24;
    const KIT_NAMES = ["808","909","C78","606","Speech 1","Speech 2","Speech 3","Speech 4"];
    const PAD_NAMES = ["Pad 1","Pad 2","Pad 3","Pad 4","Pad 5","Pad 6","Pad 7","Pad 8"];

    function fail(message) { throw new Error(message) }
    function readU24(bytes, offset) { return bytes[offset] | bytes[offset+1] << 8 | bytes[offset+2] << 16 }
    function readU16(bytes, offset) { return bytes[offset] | bytes[offset+1] << 8 }
    function writeU24(bytes, offset, value) {
      bytes[offset] = value & 255; bytes[offset+1] = value >> 8 & 255; bytes[offset+2] = value >> 16 & 255;
    }
    function writeU16(bytes, offset, value) {
      bytes[offset] = value & 255; bytes[offset+1] = value >> 8 & 255;
    }
    function hasData(bytes,start,end) {
      for (let offset=start;offset<Math.min(end,bytes.length);offset++) if (bytes[offset]) return true;
      return false;
    }
    function hasMagic(bytes,offset,text) {
      return [...text].every((char,index)=>bytes[offset+index]===char.charCodeAt(0));
    }

    function parsePool(bytes,poolOffset,capacity,sourceName) {
      if (bytes[poolOffset] !== 80 || bytes[poolOffset+1] !== 76)
        fail(`No ALYNXDJ PL sample bank was found in ${sourceName}.`);
      const kitCount = bytes[poolOffset+2];
      if (kitCount < 1 || kitCount > 8) fail(`${sourceName} declares ${kitCount} sample kits; ALYNXDJ supports 1–8.`);
      const directorySize = 4 + kitCount * 8 * 5;
      if (directorySize > capacity) fail(`${sourceName}'s sample directory is truncated.`);
      const kits = [];
      let poolUsed = directorySize, previousEnd = directorySize;
      for (let kit=0; kit<kitCount; kit++) {
        const row = [];
        for (let slot=0; slot<8; slot++) {
          const entry = poolOffset + 4 + (kit*8+slot)*5;
          const relativeOffset = readU24(bytes,entry);
          const length = readU16(bytes,entry+3);
          const end = relativeOffset + length;
          if (relativeOffset < directorySize || end > capacity)
            fail(`Kit ${kit+1}, pad ${slot+1} points outside the sample pool.`);
          if (relativeOffset < previousEnd) fail(`Kit ${kit+1}, pad ${slot+1} overlaps an earlier sample.`);
          if (length < 1 || length > SLOT_CAP) fail(`Kit ${kit+1}, pad ${slot+1} has an unsupported sample length.`);
          const start = poolOffset + relativeOffset;
          row.push(new Int8Array(bytes.buffer.slice(start,start+length)));
          previousEnd = end; poolUsed = Math.max(poolUsed,end);
        }
        kits.push(row);
      }
      return {kits,kitCount,poolUsed};
    }

    function parseRom(input) {
      const bytes = input instanceof Uint8Array ? Uint8Array.from(input) : new Uint8Array(input.slice(0));
      if (bytes.length !== ROM_BYTES) fail(`Expected a ${formatBytes(ROM_BYTES)} ALYNXDJ ROM, got ${formatBytes(bytes.length)}.`);
      if (bytes[0] !== 76 || bytes[1] !== 89 || bytes[2] !== 78 || bytes[3] !== 88)
        fail("This file is not a valid .lnx cartridge image (missing LYNX header).");
      const helpLayout=hasMagic(bytes,HELP_DATA_OFFSET,"AHD1");
      const currentMidi=hasData(bytes,PRE_HELP_POOL_END,PRE_HELP_POOL_END+0x600);
      const legacyMidi=!currentMidi&&hasData(bytes,LEGACY_POOL_END,LEGACY_POOL_END+0x600);
      const poolEnd=helpLayout?POOL_END:(legacyMidi?LEGACY_POOL_END:PRE_HELP_POOL_END);
      const poolCapacity=poolEnd-POOL_OFFSET;
      return {bytes,poolEnd,poolCapacity,legacyLayout:legacyMidi,helpLayout,
              ...parsePool(bytes,POOL_OFFSET,poolCapacity,"the ROM at cart block 45")};
    }

    function parseBank(input) {
      const bytes = input instanceof Uint8Array ? Uint8Array.from(input) : new Uint8Array(input.slice(0));
      if (bytes.length > POOL_CAPACITY)
        fail(`The sample bank is ${formatBytes(bytes.length)}; this ROM has ${formatBytes(POOL_CAPACITY)} available.`);
      const parsed=parsePool(bytes,0,bytes.length,"the selected file");
      if (parsed.poolUsed !== bytes.length)
        fail(`The sample bank has ${formatBytes(bytes.length-parsed.poolUsed)} of trailing data.`);
      return {bytes,...parsed};
    }

    function buildPool(kits,capacity=POOL_CAPACITY) {
      if (kits.length < 1 || kits.length > 8) fail("A pool must contain 1–8 kits.");
      for (const [kitIndex,kit] of kits.entries()) {
        if (kit.length !== 8) fail(`Kit ${kitIndex+1} must contain exactly 8 pads.`);
        for (const [slotIndex,sample] of kit.entries())
          if (sample.length < 1 || sample.length > SLOT_CAP)
            fail(`Kit ${kitIndex+1}, pad ${slotIndex+1} exceeds the ${SLOT_CAP}-byte slot limit.`);
      }
      const directorySize = 4 + kits.length * 8 * 5;
      const used = kits.reduce((total,kit) => total + kit.reduce((sum,sample) => sum+sample.length,0),directorySize);
      if (used > capacity)
        fail(`The sample pool needs ${formatBytes(used)}, but the ROM has ${formatBytes(capacity)} available.`);
      const pool = new Uint8Array(used);
      pool.set([80,76,kits.length,0]);
      let entry=4, sampleOffset=directorySize;
      for (const kit of kits) for (const sample of kit) {
        writeU24(pool,entry,sampleOffset); writeU16(pool,entry+3,sample.length);
        pool.set(new Uint8Array(sample.buffer,sample.byteOffset,sample.byteLength),sampleOffset);
        entry += 5; sampleOffset += sample.length;
      }
      return pool;
    }

    function patchRom(source,kits) {
      const pool = buildPool(kits,source.poolCapacity);
      const patched = Uint8Array.from(source.bytes);
      patched.fill(0,POOL_OFFSET,source.poolEnd); patched.set(pool,POOL_OFFSET);
      return patched;
    }

    function roundHalfToEven(value) {
      const sign=value<0?-1:1, absolute=Math.abs(value), lower=Math.floor(absolute), fraction=absolute-lower;
      if (fraction<.5) return sign*lower;
      if (fraction>.5) return sign*(lower+1);
      return sign*(lower%2===0?lower:lower+1);
    }

    /* Gain is applied before the optional tanh stage. With drive disabled,
     * values outside the signed 8-bit range hard-clip as they will in the
     * ROM. With drive enabled, tanh provides a bounded soft saturation. */
    function processSample(source,gainDb=0,tanhDrive=false) {
      if (!source?.length) fail("A sample must contain at least one PCM byte.");

    app.addEventListener("change",event=>{
      const target=event.target;
      if (target.id==="romInput" && target.files?.[0]) loadRom(target.files[0]);
      else if (target.id==="bankInput" && target.files?.[0]) loadBank(target.files[0]);
      else if (target.id==="kitInput" && target.files?.length) replaceKit(target.files);
      else if (target.matches("[data-sample-input]") && target.files?.[0]) replaceSlot(Number(target.dataset.sampleInput),target.files[0]);
      else if (target.matches("[data-trim-start],[data-trim-end]")) {
        const trim=updateTrimPreview(target.closest("[data-slot]"),target);
        updateProcessing(trim.index,{trimStart:trim.trimStart,trimEnd:trim.trimEnd}); clearNotices();
        state.message=`Kit ${Math.floor(trim.index/8)+1}, pad ${trim.index%8+1} trimmed to ${sampleTime(trim.trimEnd-trim.trimStart)}.`; render();
      }
      else if (target.matches("[data-gain]")) {
        const index=Number(target.dataset.gain), gainDb=Number(target.value);
        updateProcessing(index,{gainDb}); clearNotices();
        state.message=`Kit ${Math.floor(index/8)+1}, pad ${index%8+1} gain set to ${gainLabel(gainDb)}.`; render();
      } else if (target.matches("[data-drive]")) {
        const index=Number(target.dataset.drive), tanhDrive=target.checked;
        updateProcessing(index,{tanhDrive}); clearNotices();
        state.message=`Kit ${Math.floor(index/8)+1}, pad ${index%8+1} tanh drive ${tanhDrive?"enabled":"disabled"}.`; render();
      }
      if (target.type==="file") target.value="";
    });
    app.addEventListener("input",event=>{
      const target=event.target;
      if (target.matches("[data-trim-start],[data-trim-end]")) updateTrimPreview(target.closest("[data-slot]"),target);
      else if (target.matches("[data-gain]")) {
        const output=app.querySelector(`[data-gain-output="${target.dataset.gain}"]`);
        if (output) output.textContent=gainLabel(Number(target.value));
      }
    });
    app.addEventListener("dragover",event=>{
      const target=event.target.closest("[data-rom-drop],[data-slot]"); if (!target) return;
      event.preventDefault(); target.classList.add("dragging");
    });
    app.addEventListener("dragleave",event=>event.target.closest("[data-rom-drop],[data-slot]")?.classList.remove("dragging"));
    app.addEventListener("drop",event=>{
      const target=event.target.closest("[data-rom-drop],[data-slot]"); if (!target) return;
      event.preventDefault(); target.classList.remove("dragging"); const file=event.dataTransfer.files?.[0]; if (!file) return;
      if (target.matches("[data-rom-drop]")) loadRom(file); else replaceSlot(Number(target.dataset.slot),file);
    });
    render();
  })();
  </script>
</body>
</html>
